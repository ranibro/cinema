<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Listas</title>
    </head>

    <body>
        <h4>Lista não ordenada: </h4>
        <ul>
            <li>Item A</li>
            <li>Item B</li>
            <li>Item C</li>
        </ul>
        
        <h4>Lista Ordenada: </h4>
        <ol>
            <li>Item A</li>
            <li>Item B</li>
            <li>Item C</li>
        </ol>
    </body>
</html>
