<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Tabela</title>
    </head>

    <body>
        <h1>Tabela</h1>
        <table>
            <caption>Alunos</caption>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Nota</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Aluno A</td>
                    <td>9.0</td>
                </tr>
                <tr>
                    <td>Aluno B</td>
                    <td>4.5</td>
                </tr>
            </tbody>
            <tfoot>
                <tr>
                    <td colspan="2">Quantidade de Alunos: 2</td>
                </tr>
            </tfoot>
        </table>
    </body>
</html>
